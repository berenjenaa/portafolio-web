<section class="projects" id="projects">
  <div class="projects__container">

    <div class="projects__header">
      <span class="section__label">// proyectos</span>
      <h2 class="section__title">Software que <span>construí</span></h2>
    </div>

    <div class="projects__grid">
      @for (project of projects(); track project.id) {
        <article class="project-card">

          <div class="project-card__top">
            <span class="project-card__number">0{{ project.id }}</span>
            <div class="project-card__title-group">
              <h3 class="project-card__title">{{ project.title }}</h3>
              <p class="project-card__subtitle">{{ project.subtitle }}</p>
            </div>
          </div>

          <p class="project-card__desc">{{ project.description }}</p>

          <div class="project-card__stack">
            @for (tech of project.stack; track tech) {
              <span class="project-card__tag">{{ tech }}</span>
            }
          </div>

        </article>
      }
    </div>

  </div>
</section>
